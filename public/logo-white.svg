<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80" role="img" aria-label="Ellice Capital – Investment Group">

  <!-- Hexagon mark -->
  <g transform="translate(40,40)">
    <polygon points="0,-36 31,-18 31,18 0,36 -31,18 -31,-18" fill="#534AB7"/>
    <polygon points="0,-28 24,-14 24,14 0,28 -24,14 -24,-14" fill="none" stroke="white" stroke-width="0.6" opacity="0.25"/>
    <text x="0" y="7" text-anchor="middle"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="20" font-weight="700" fill="white" letter-spacing="2">EC</text>
  </g>

  <!-- ELLICE wordmark — white for dark backgrounds -->
  <text x="84" y="44"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="34" font-weight="700" letter-spacing="8" fill="white">ELLICE</text>

  <!-- Rule — soft white -->
  <line x1="84" y1="52" x2="316" y2="52" stroke="white" stroke-width="0.75" opacity="0.35"/>

  <!-- Subtitle — muted white -->
  <text x="85" y="67"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="11" font-weight="400" letter-spacing="3.5" fill="white" opacity="0.5">Capital  ·  Investment Group</text>

</svg>
