<svg viewBox="0 0 375 72" width="750" height="144" xmlns="http://www.w3.org/2000/svg" aria-label="Ellice Capital">
  <!-- Dark background -->
  <rect width="375" height="72" fill="#0d0b1a" rx="4"/>

  <!-- Hex mark -->
  <g transform="translate(36,36)">
    <polygon points="0,-28 24.2,-14 24.2,14 0,28 -24.2,14 -24.2,-14" fill="#534AB7" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <polygon points="0,-20 17.3,-10 17.3,10 0,20 -17.3,10 -17.3,-10" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.8"/>
    <text x="0" y="6.5" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="700" fill="#EF9F27" letter-spacing="1">EC</text>
  </g>

  <!-- ELLICE wordmark -->
  <text x="74" y="32" font-family="Georgia, serif" font-size="24" font-weight="700" letter-spacing="7" fill="#FFFFFF">ELLICE</text>

  <!-- CAPITAL · INVESTMENT GROUP -->
  <text x="75" y="49" font-family="Arial, sans-serif" font-size="9" letter-spacing="2" fill="rgba(255,255,255,0.55)">CAPITAL  ·  INVESTMENT GROUP</text>

  <!-- Vertical divider -->
  <line x1="278" y1="14" x2="278" y2="58" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>

  <!-- Pacific Sovereign Capital tagline -->
  <text x="290" y="27" font-family="Georgia, serif" font-size="10" letter-spacing="0.5" fill="rgba(255,255,255,0.65)">Pacific</text>
  <text x="290" y="41" font-family="Georgia, serif" font-size="10" letter-spacing="0.5" fill="rgba(255,255,255,0.65)">Sovereign</text>
  <text x="290" y="55" font-family="Georgia, serif" font-size="10" letter-spacing="0.5" fill="rgba(255,255,255,0.65)">Capital</text>
</svg>
